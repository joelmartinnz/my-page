<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geometry Dash</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(180deg, #0b132b, #020617);
      color: #f7f7ff;
      font-family: Inter, system-ui, sans-serif;
    }
    #container {
      width: min(100%, 980px);
      padding: 24px;
    }
    h1 {
      text-align: center;
      font-size: 3rem;
      margin-bottom: 18px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7dfdfd, #95e17c, #fffb72);
      -webkit-background-clip: text;
      color: transparent;
    }
    #menu {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }
    .level-button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(124, 252, 252, 0.28);
      border-radius: 18px;
      padding: 16px 20px;
      color: #eef8ff;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      text-align: center;
    }
    .level-button:hover {
      transform: translateY(-3px);
      background: rgba(255,255,255,0.12);
    }
    .level-button.active {
      border-color: #ffeb6d;
      background: rgba(255, 235, 109, 0.12);
    }
    #gameInfo {
      margin-bottom: 18px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }
    #gameInfo div {
      font-size: 12px;
      color: #cfd9ff;
    }
    #gameInfo div span {
      font-weight: 700;
      color: #fff;
    }
    #gameCanvas {
      width: 100%;
      height: 520px;
      background: #09111c;
      border: 1px solid rgba(209, 245, 255, 0.22);
      border-radius: 24px;
      display: block;
      margin: 0 auto;
      box-shadow: 0 30px 80px rgba(2, 11, 28, 0.55);
    }
    #controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .control-button {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(124, 252, 252, 0.28);
      background: rgba(255,255,255,0.06);
      color: #eef8ff;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .control-button:hover { transform: translateY(-2px); background: rgba(255,255,255,0.12); }
    #instructions {
      margin-top: 20px;
      line-height: 1.6;
      color: #c8d7ff;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>Geometry Dash</h1>
    <div id="menu"></div>
    <div id="gameInfo">
      <div>Level <span id="levelLabel">1</span></div>
      <div>Score <span id="scoreLabel">0</span></div>
      <div>Status <span id="statusLabel">Ready</span></div>
    </div>
    <canvas id="gameCanvas" width="920" height="520"></canvas>
    <div id="controls">
      <button class="control-button" id="startBtn">Start</button>
      <button class="control-button" id="restartBtn">Restart</button>
      <button class="control-button" id="backBtn">Back to Arcade</button>
    </div>
    <div id="instructions">
      Press SPACE to jump. Each level adds new obstacles and speed. Survive through a short geometry course and reach the end!
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
