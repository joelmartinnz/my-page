<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voxel Preview</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, sans-serif;
      background: linear-gradient(135deg, #07131f, #0d2334 60%, #09111b);
      color: #f3fbff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .panel {
      width: min(92vw, 960px);
      background: rgba(7, 18, 28, 0.92);
      border: 1px solid rgba(120, 220, 255, 0.22);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.3);
    }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: linear-gradient(135deg, #3ce4ff, #1790d8);
      color: #022231;
      font-weight: 700;
      cursor: pointer;
    }
    canvas {
      width: 100%;
      display: block;
      border-radius: 16px;
      border: 1px solid rgba(120, 220, 255, 0.18);
      background: linear-gradient(180deg, #102639 0%, #0e1a28 100%);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h1>Voxel Preview</h1>
    <p>This lightweight preview lets you inspect the terrain generation work in a browser before the full gameplay systems are wired up.</p>
    <div class="controls">
      <button id="startBtn">Start Preview</button>
      <button id="regenBtn">Regenerate Terrain</button>
    </div>
    <canvas id="terrainCanvas" width="960" height="540"></canvas>
  </div>
  <script src="./voxel-preview.js"></script>
</body>
</html>
